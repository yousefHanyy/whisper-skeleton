<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Log in · Whisper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-base-200">
  <div id="nav"></div>
  <main class="max-w-md mx-auto p-4">
    <div class="card bg-base-100 shadow">
      <div class="card-body">
        <h2 class="card-title">Log in</h2>
        <form id="form" class="space-y-2">
          <input name="email" type="email" placeholder="email" class="input input-bordered w-full" required />
          <input name="password" type="password" placeholder="password" class="input input-bordered w-full" required />
          <button class="btn btn-primary w-full">Log in</button>
        </form>
        <div id="err" class="text-error text-sm min-h-[1.25rem]"></div>
        <a href="/signup.html" class="link link-hover text-center">Need an account? Sign up</a>
      </div>
    </div>
  </main>
  <script src="/app.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      try {
        const res = await api('POST', '/api/auth/login', {
          body: { email: f.email.value.trim(), password: f.password.value },
        });
        setToken(res.token);
        const user = await api('GET', '/api/auth/me', { auth: true });
        setUser(user);
        location.href = '/inbox.html';
      } catch (err) {
        document.getElementById('err').textContent = err.message;
      }
    });
  </script>
</body>
</html>
