<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feed · Whisper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-base-200">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">Global feed</h2>
    <div class="join mb-4 w-full">
      <input id="tag" placeholder="filter by tag (e.g. music)" class="input input-bordered join-item flex-1" />
      <button id="apply" class="btn btn-primary join-item">Filter</button>
      <button id="clear" class="btn btn-ghost join-item">Clear</button>
    </div>
    <div id="list" class="space-y-3"></div>
  </main>
  <script src="/app.js"></script>
  <script>
    function render(items) {
      const list = document.getElementById('list');
      if (!items.length) { list.innerHTML = '<div class="alert">No public answers yet.</div>'; return; }
      list.innerHTML = items.map((q) => {
        const r = q.recipient || {};
        return `
          <div class="card bg-base-100 shadow">
            <div class="card-body">
              <div class="text-sm opacity-70">
                answered by
                <a class="link" href="/user.html?u=${encodeURIComponent(r.username)}">@${escapeHtml(r.username)}</a>
                ${r.displayName ? `<span class="opacity-80">(${escapeHtml(r.displayName)})</span>` : ''}
              </div>
              <div class="italic opacity-80">"${escapeHtml(q.body)}"</div>
              <div>${escapeHtml(q.answer)}</div>
              <div class="text-xs opacity-60">${new Date(q.answeredAt).toLocaleString()}</div>
              <div class="flex flex-wrap gap-1">
                ${(r.tags || []).map((t) => `<a href="/feed.html?tag=${encodeURIComponent(t)}" class="badge badge-outline">${escapeHtml(t)}</a>`).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    async function load(tag) {
      try {
        const res = await api('GET', `/api/feed${tag ? `?tag=${encodeURIComponent(tag)}` : ''}`);
        render(res.data);
      } catch (err) {
        document.getElementById('list').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    }
    const url = new URL(location.href);
    const initTag = url.searchParams.get('tag') || '';
    document.getElementById('tag').value = initTag;
    load(initTag);
    document.getElementById('apply').addEventListener('click', () => {
      const t = document.getElementById('tag').value.trim();
      history.replaceState(null, '', t ? `?tag=${encodeURIComponent(t)}` : location.pathname);
      load(t);
    });
    document.getElementById('clear').addEventListener('click', () => {
      document.getElementById('tag').value = '';
      history.replaceState(null, '', location.pathname);
      load('');
    });
  </script>
</body>
</html>
