<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User · Whisper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-base-200">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto p-4">
    <div id="profile"></div>
    <div id="sendCard"></div>
    <h3 class="text-xl font-bold mt-6 mb-2">Public answers</h3>
    <div id="list" class="space-y-3"></div>
  </main>
  <script src="/app.js"></script>
  <script>
    const u = new URL(location.href).searchParams.get('u');
    if (!u) {
      document.getElementById('profile').innerHTML = '<div class="alert alert-error">Missing ?u=username</div>';
    } else {
      document.title = `@${u} · Whisper`;
      (async () => {
        try {
          const user = await api('GET', `/api/users/${encodeURIComponent(u)}`);
          document.getElementById('profile').innerHTML = `
            <div class="card bg-base-100 shadow">
              <div class="card-body">
                <div class="flex items-center gap-4">
                  ${user.avatarUrl ? `<img src="${escapeHtml(user.avatarUrl)}" class="w-16 h-16 rounded-full object-cover" />` : '<div class="avatar placeholder"><div class="bg-neutral text-neutral-content rounded-full w-16"><span class="text-xl">'+escapeHtml(user.username[0].toUpperCase())+'</span></div></div>'}
                  <div>
                    <h2 class="card-title">${escapeHtml(user.displayName || user.username)}</h2>
                    <div class="text-sm opacity-70">@${escapeHtml(user.username)}</div>
                  </div>
                </div>
                ${user.bio ? `<p class="mt-2">${escapeHtml(user.bio)}</p>` : ''}
                <div class="flex flex-wrap gap-1 mt-2">
                  ${(user.tags || []).map((t) => `<a href="/feed.html?tag=${encodeURIComponent(t)}" class="badge badge-outline">${escapeHtml(t)}</a>`).join('')}
                </div>
                ${user.acceptingQuestions === false ? '<div class="badge badge-warning mt-2">Not accepting questions</div>' : ''}
              </div>
            </div>
          `;

          if (user.acceptingQuestions !== false) {
            document.getElementById('sendCard').innerHTML = `
              <div class="card bg-base-100 shadow mt-4">
                <div class="card-body">
                  <h3 class="card-title">Ask anonymously</h3>
                  <textarea id="qbody" class="textarea textarea-bordered" placeholder="your question (1-500 chars)" maxlength="500" minlength="1"></textarea>
                  <button id="send" class="btn btn-primary self-start">Send</button>
                  <div id="sendMsg" class="text-sm min-h-[1.25rem]"></div>
                </div>
              </div>
            `;
            document.getElementById('send').addEventListener('click', async () => {
              const msg = document.getElementById('sendMsg');
              const body = document.getElementById('qbody').value.trim();
              if (!body) { msg.innerHTML = '<span class="text-error">Empty question</span>'; return; }
              try {
                await api('POST', `/api/users/${encodeURIComponent(u)}/questions`, { body: { body } });
                document.getElementById('qbody').value = '';
                msg.innerHTML = '<span class="text-success">Sent anonymously!</span>';
              } catch (err) {
                msg.innerHTML = `<span class="text-error">${escapeHtml(err.message)}</span>`;
              }
            });
          }

          const feed = await api('GET', `/api/users/${encodeURIComponent(u)}/questions`);
          document.getElementById('list').innerHTML = feed.data.length
            ? feed.data.map((q) => `
              <div class="card bg-base-100 shadow">
                <div class="card-body">
                  <div class="italic opacity-80">"${escapeHtml(q.body)}"</div>
                  <div class="mt-1">${escapeHtml(q.answer)}</div>
                  <div class="text-xs opacity-60">${new Date(q.answeredAt).toLocaleString()}</div>
                </div>
              </div>
            `).join('')
            : '<div class="alert">No public answers yet.</div>';
        } catch (err) {
          document.getElementById('profile').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        }
      })();
    }
  </script>
</body>
</html>
